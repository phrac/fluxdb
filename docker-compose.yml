services:
  # Single-node FluxDB with Redis protocol enabled
  fluxdb:
    build: .
    ports:
      - "5148:5148"
      - "6379:6379"
    volumes:
      - fluxdb-data:/var/lib/fluxdb
    command: ["--listen", "0.0.0.0:5148", "--redis", "0.0.0.0:6379", "--data-dir", "/var/lib/fluxdb"]
    restart: unless-stopped

  # ── 3-node cluster ──────────────────────────────────────────────────────────
  # Uncomment the sections below (and comment out the single-node service above)
  # to run a 3-node sharded cluster.

  # node0:
  #   build: .
  #   ports:
  #     - "5148:5148"
  #   volumes:
  #     - node0-data:/var/lib/fluxdb
  #     - ./cluster/node0.toml:/etc/fluxdb/fluxdb.toml:ro
  #   command: ["--config", "/etc/fluxdb/fluxdb.toml"]
  #   restart: unless-stopped
  #
  # node1:
  #   build: .
  #   ports:
  #     - "5158:5148"
  #   volumes:
  #     - node1-data:/var/lib/fluxdb
  #     - ./cluster/node1.toml:/etc/fluxdb/fluxdb.toml:ro
  #   command: ["--config", "/etc/fluxdb/fluxdb.toml"]
  #   restart: unless-stopped
  #
  # node2:
  #   build: .
  #   ports:
  #     - "5168:5148"
  #   volumes:
  #     - node2-data:/var/lib/fluxdb
  #     - ./cluster/node2.toml:/etc/fluxdb/fluxdb.toml:ro
  #   command: ["--config", "/etc/fluxdb/fluxdb.toml"]
  #   restart: unless-stopped

volumes:
  fluxdb-data:
